<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Finance Officer Dashboard</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
    <div id="finance-dashboard" class="glass-panel" style="padding:20px;">
        <h2>Finance Review</h2>
        <div id="toast-container"></div>
        <section id="pending-requests">
            <h3>Pending Requests</h3>
            <div id="request-list" class="flex-col gap-12"></div>
        </section>
        <section id="expense-trends" style="margin-top:24px;">
            <h3>Expense Trends</h3>
            <canvas id="expenseChart" width="400" height="200"></canvas>
        </section>
        <section id="budget-adjust" style="margin-top:24px;">
            <h3>Adjust Department Budget</h3>
            <form id="budget-form" style="display:flex;flex-direction:column;gap:20px;max-width:600px;background:var(--card-bg, rgba(255,255,255,0.03));padding:24px;border-radius:16px;border:1px solid var(--card-border, rgba(255,255,255,0.1));box-shadow:0 8px 32px rgba(0,0,0,0.1);">
                <div class="form-group">
                    <label style="font-weight:600;font-size:0.9rem;color:var(--text-muted);margin-bottom:8px;display:block;">Select Department:</label>
                    <select name="deptId" id="dept-select" class="form-input" required style="cursor:pointer; margin-top:6px;">
                        <option value="">Loading departments...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label style="font-weight:600;font-size:0.9rem;color:var(--text-muted);margin-bottom:8px;display:block;">Overall New Budget (₹):</label>
                    <input type="number" name="budget" min="0" required placeholder="Enter amount" class="form-input" style="margin-top:6px;" />
                </div>
                
                <div style="margin-top:8px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <label style="font-weight:600;font-size:0.9rem;color:var(--text-muted);">Category Limits (Optional):</label>
                        <button type="button" id="add-category-btn" class="btn btn-ghost btn-sm" style="font-size:0.75rem;padding:6px 12px;border-radius:8px;">+ Add Category</button>
                    </div>
                    <div id="category-limits-container" style="display:flex;flex-direction:column;gap:12px;">
                        <!-- Dynamic rows injected here -->
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="update-budget-btn" style="padding:14px;border-radius:12px;font-weight:600;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;">
                    Update Limits & Budget
                </button>
            </form>
        </section>
    </div>
    <script type="module" src="/src/modules/financeDashboard.js"></script>
</body>
</html>
